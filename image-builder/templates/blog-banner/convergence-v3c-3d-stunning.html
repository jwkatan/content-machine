<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Convergence V3C — 3D Stunning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1960px;
      height: 960px;
      background: #0A0A16;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    /* ── Primary center glow — massive, intense ── */
    .center-glow {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1400px;
      height: 900px;
      background: radial-gradient(ellipse, rgba(94,110,255,0.55) 0%, rgba(94,110,255,0.22) 30%, rgba(94,110,255,0.06) 55%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Secondary purple accent glow ── */
    .purple-glow {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(209,119,255,0.18) 0%, rgba(209,119,255,0.05) 40%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Warm center hotspot ── */
    .center-hotspot {
      position: absolute;
      top: 44%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(197,205,255,0.12) 30%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Vignette overlay — darkens corners, preserves center brightness ── */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 65% 65% at 50% 48%, transparent 0%, rgba(6,6,14,0.25) 55%, rgba(6,6,14,0.75) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── 3D perspective container ── */
    .perspective-container {
      position: absolute;
      inset: 0;
      perspective: 1200px;
      perspective-origin: 50% 40%;
      z-index: 2;
    }

    /* ── The tilted plane ── */
    .tilted-plane {
      position: absolute;
      width: 1960px;
      height: 960px;
      transform: rotateX(42deg);
      transform-origin: 50% 50%;
      transform-style: preserve-3d;
    }

    /* ── Floor reflection ── */
    .reflection-container {
      position: absolute;
      inset: 0;
      perspective: 1200px;
      perspective-origin: 50% 40%;
      z-index: 0;
    }

    .reflection-plane {
      position: absolute;
      width: 1960px;
      height: 960px;
      transform: rotateX(42deg) scaleY(-1) translateY(-300px);
      transform-origin: 50% 50%;
      opacity: 0.08;
      filter: blur(3px);
    }

    /* ── Outer scatter SVG ── */
    .scatter-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── Light rays from center ── */
    .light-rays {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Logo ── */
    .logo {
      position: absolute;
      bottom: 48px;
      left: 64px;
      opacity: 0.4;
      z-index: 10;
    }

    .logo svg {
      width: 120px;
      height: auto;
    }
  </style>
</head>

  <div class="perspective-container">
    <svg class="tilted-plane" viewBox="0 0 1960 960" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Radial glow for center attraction — intense -->
        <radialGradient id="coreGlow" cx="50%" cy="50%" r="38%">
          <stop offset="0%" stop-color="#5E6EFF" stop-opacity="0.35"/>
          <stop offset="40%" stop-color="#5E6EFF" stop-opacity="0.12"/>

          <stop offset="0%" stop-color="#A0ADFF"/>
          <stop offset="35%" stop-color="#7A8AFF"/>
          <stop offset="65%" stop-color="#5E6EFF"/>
          <stop offset="100%" stop-color="#3A4ACC"/>

          <stop offset="0%" stop-color="#C5CDFF"/>
          <stop offset="30%" stop-color="#A0ADFF"/>
          <stop offset="60%" stop-color="#7A8AFF"/>
          <stop offset="100%" stop-color="#5060DD"/>
        </linearGradient>

        <!-- Center node gradient — white-hot -->
        <linearGradient id="box3dCore" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="25%" stop-color="#E0E4FF"/>
          <stop offset="55%" stop-color="#C5CDFF"/>
          <stop offset="100%" stop-color="#8090FF"/>
        </linearGradient>

        <!-- Consistent bloom applied to grid groups -->
        <filter id="gridBloom" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="bloom"/>
          <feMerge>
            <feMergeNode in="bloom"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Intense bloom for center cluster -->
        <filter id="centerBloom" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="bloom1"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="bloom2"/>
          <feMerge>
            <feMergeNode in="bloom1"/>
            <feMergeNode in="bloom2"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Subtle line glow -->
        <filter id="lineGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
        </filter>

        <!-- Consistent depth shadow for ALL grid nodes -->
        <filter id="nodeShadow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
        </filter>
