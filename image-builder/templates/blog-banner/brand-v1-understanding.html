<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog Banner — Understanding Emerges</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1960px;
      height: 960px;
      overflow: hidden;
      background: #1A2761;
    }

    body {
      position: relative;
    }

    /* ── Hero radial gradient background (from bottom center upward) ── */
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 130% 160% at 50% 120%,
          #325BFF 0%,
          #2635A7 30%,
          #1A2761 60%,
          #0F1740 100%
        );
    }

    /* ── Diagonal prismatic stripes (hero artwork) ──
         "flowing bottom-left to upper-right, brand gradient (blue → peach → amber)" */
    .prism-stripes {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .prism-stripes::before {
      content: '';
      position: absolute;
      width: 300%;
      height: 300%;
      top: -50%;
      left: -70%;
      background: repeating-linear-gradient(
        -35deg,
        transparent 0px,
        transparent 90px,
        rgba(50, 91, 255, 0.07) 90px,
        rgba(50, 91, 255, 0.07) 92px,
        transparent 92px,
        transparent 180px,
        rgba(104, 145, 249, 0.05) 180px,
        rgba(104, 145, 249, 0.05) 181px,
        transparent 181px,
        transparent 270px,
        rgba(233, 157, 177, 0.04) 270px,
        rgba(233, 157, 177, 0.04) 272px,
        transparent 272px,
        transparent 360px,
        rgba(255, 223, 187, 0.03) 360px,
        rgba(255, 223, 187, 0.03) 361px,
        transparent 361px,
        transparent 450px
      );
    }

    /* Wide prismatic light band flowing diagonally */
    .prism-band {
      position: absolute;
      width: 220%;
      height: 420px;
      top: 52%;
      left: -35%;
      transform: rotate(-14deg) translateY(-50%);
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(50, 91, 255, 0.06) 15%,
        rgba(104, 145, 249, 0.09) 30%,
        rgba(233, 157, 177, 0.06) 50%,
        rgba(255, 223, 187, 0.04) 65%,
        rgba(243, 243, 251, 0.02) 80%,
        transparent 100%
      );
    }

    /* Secondary narrower band */
    .prism-band-2 {
      position: absolute;
      width: 220%;
      height: 160px;
      top: 36%;
      left: -35%;
      transform: rotate(-14deg) translateY(-50%);
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(50, 91, 255, 0.04) 20%,
        rgba(233, 157, 177, 0.045) 50%,
        rgba(255, 223, 187, 0.035) 70%,
        transparent 100%
      );
    }

    /* Third thinnest band (top area) */
    .prism-band-3 {
      position: absolute;
      width: 220%;
      height: 80px;
      top: 22%;
      left: -35%;
      transform: rotate(-14deg) translateY(-50%);
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(50, 91, 255, 0.03) 25%,
        rgba(104, 145, 249, 0.035) 50%,
        transparent 100%
      );
    }

    /* ── Center glow ── */
    .center-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1100px;
      height: 1100px;
      background: radial-gradient(
        ellipse,
        rgba(50, 91, 255, 0.14) 0%,
        rgba(50, 91, 255, 0.05) 35%,
        transparent 65%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Warm glow at bottom */
    .warm-glow {
      position: absolute;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 1400px;
      height: 600px;
      background: radial-gradient(
        ellipse,
        rgba(233, 157, 177, 0.06) 0%,
        rgba(255, 223, 187, 0.03) 40%,
        transparent 70%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* ── Ambient dot grids (decorative, lower opacity) ── */
    .ambient-dots {
      position: absolute;
      z-index: 1;
      opacity: 0.15;
    }

    .ambient-left {
      top: 60px;
      left: 60px;
    }

    .ambient-right {
      bottom: 60px;
      right: 60px;
    }

    /* ── Nested frame effect ──
         "3 nested containers, each with the accent gradient as background,
          with increasing padding — creating concentric colored borders
          around a content card. No border-radius. All sharp corners." */
    .nested-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    /* Outermost gradient border (thickest) */
    .frame-outer {
      padding: 4px;
      background: linear-gradient(180deg,
        #1A2761 34%,
        #325BFF 56%,
        #E99DB1 70%,
        #FFDFBB 84%,
        #F3F3FB 91%
      );
    }

    /* Gap between outer and middle */
    .frame-gap-1 {
      padding: 16px;
      background: #1A2761;
    }

    /* Middle gradient border */
    .frame-mid {
      padding: 3px;
      background: linear-gradient(180deg,
        #1A2761 34%,
        #325BFF 56%,
        #E99DB1 70%,
        #FFDFBB 84%,
        #F3F3FB 91%
      );
    }

    /* Gap between middle and inner */
    .frame-gap-2 {
      padding: 12px;
      background: #1A2761;
    }

    /* Innermost gradient border */
    .frame-inner {
      padding: 2px;
      background: linear-gradient(180deg,
        rgba(50, 91, 255, 0.5) 34%,
        rgba(233, 157, 177, 0.35) 70%,
        rgba(255, 223, 187, 0.25) 91%
      );
    }

    /* Content area */
    .frame-content {
      width: 600px;
      height: 600px;
      background: rgba(26, 39, 97, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Inner glow inside the frame */
    .frame-content::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        rgba(50, 91, 255, 0.12) 0%,
        transparent 65%
      );
    }

    /* ── Vignette ── */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 90% 90% at 50% 50%,
        transparent 40%,
        rgba(15, 23, 64, 0.55) 100%
      );
      z-index: 3;
      pointer-events: none;
    }
  </style>
