<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Regesto Grotesk';
      src: local('Regesto Grotesk');
      font-weight: 400;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 400px;
      background: #1A2761;
      overflow: hidden;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
    }

    /* Depth: top-left blue glow */
    .glow-tl {
      position: absolute;
      top: -80px;
      left: -120px;
      width: 720px;
      height: 520px;
      background: radial-gradient(ellipse, rgba(50,91,255,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Depth: bottom-right warm glow */
    .glow-br {
      position: absolute;
      bottom: -120px;
      right: -80px;
      width: 600px;
      height: 440px;
      background: radial-gradient(ellipse, rgba(233,157,177,0.10) 0%, rgba(255,223,187,0.06) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle dot grid texture */
    .dot-grid {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.035;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
      padding: 0 96px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .eyebrow {
      font-family: 'Manrope', sans-serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6891F9;
    }

    .headline {
      font-family: 'Regesto Grotesk', sans-serif;
      font-size: 56px;
      font-weight: 400;
      line-height: 1.1;
      color: #FDFCFE;
    }

    .headline .accent {
      color: #325BFF;
    }

    .subheadline {
      font-family: 'Manrope', sans-serif;
      font-size: 26px;
      font-weight: 300;
      line-height: 1.4;
      color: #AFC8FB;
      max-width: 840px;
      margin-top: 4px;
    }

    /* Logo bottom-right */
    .logo {
      position: absolute;
      bottom: 40px;
      right: 64px;
      opacity: 0.3;
      z-index: 3;
    }

    .logo svg {
      width: 128px;
      height: auto;
    }

    /* Thin accent line at bottom */
    .accent-line {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #325BFF 0%, #6891F9 30%, #E99DB1 65%, #FFDFBB 100%);
      z-index: 4;
    }
  </style>
</head>
<body>

  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <!-- Dot grid texture -->
  <svg class="dot-grid" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="20" cy="20" r="2" fill="white"/>
      </pattern>
    </defs>
    <rect width="1200" height="400" fill="url(#dots)"/>
  </svg>

  <div class="content">
    <div class="eyebrow">Announcing Swimm 2.0</div>
    <div class="headline">The understanding platform<br>for <span class="accent">AI modernization</span></div>
    <div class="subheadline">Verified understanding. Business control. MCP integration.</div>
  </div>

  <!-- Swimm logo -->
