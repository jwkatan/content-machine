  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    /* ============================================================
       Footer — Element Styles
       Figma node 3914:6854
       ============================================================ */

    body {
      background: var(--gray-50);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 100vh;
    }

    /* --- Footer Container --- */
    .site-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: var(--page-max-w);
      width: 100%;
      margin: 0 auto;
      background: var(--gray-100);
    }

    /* --- Links Container (top section) --- */
    .site-footer__links-container {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: var(--sp-6) 60px;
      width: 100%;
    }

    /* --- Logo Column (left side) --- */
    .site-footer__brand {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 22px;
      flex: 1;
      align-self: stretch;
    }

    .site-footer__logo {
      width: 141px;
      height: 51px;
    }

    .site-footer__logo svg {
      width: 100%;
      height: 100%;
    }

    /* --- Social Links Row --- */
    .site-footer__social {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .site-footer__social-icon {
      position: relative;
      width: 24px;
      height: 24px;
      overflow: hidden;
      cursor: pointer;
    }

    .site-footer__social-icon svg {
      width: 100%;
      height: 100%;
      transition: opacity 0.2s ease;
    }

    .site-footer__social-icon:hover svg {
      opacity: 0.7;
    }

    /* --- Certification Badge --- */
    .site-footer__cert {
      width: 103px;
      height: 103px;
    }

    .site-footer__cert img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* --- Link Columns (right side) --- */
    .site-footer__columns {
      display: flex;
      flex: 1;
      gap: 34px;
      align-items: flex-start;
    }

    /* --- Single Column --- */
    .footer-column {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      flex: 1;
      overflow: hidden;
    }

    .footer-column__heading {
      font-family: var(--text-font);
      font-size: var(--label-m-size);
      font-weight: var(--label-m-weight);
      line-height: 1;
      color: var(--blue-900);
    }

    .footer-column__links {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* --- Footer Link --- */
    .footer-link {
      display: flex;
      align-items: center;
      height: 34px;
      padding: 6px 0;
      font-family: var(--text-font);
      font-size: var(--p4-size);
      font-weight: var(--p4-weight);
      line-height: var(--p4-lh);
      color: var(--blue-700);
      text-decoration: none;
      cursor: pointer;
    }

    .footer-link:hover {
      color: var(--blue-800);
      text-decoration: underline;
    }

    /* --- Credits Bar (bottom section) --- */
    .site-footer__credits {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3) 60px;
      width: 100%;
    }

    .site-footer__credits-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 1;
    }

    /* --- Credits Text --- */
    .site-footer__copyright {
      font-family: var(--text-font);
      font-size: var(--label-s-size);
      font-weight: var(--label-s-weight);
      line-height: var(--label-s-lh);
      color: var(--gray-300);
      letter-spacing: 0.12px;
      white-space: nowrap;
    }

    /* --- Credits Links --- */
    .site-footer__credits-links {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--text-font);
      font-size: var(--label-s-size);
      font-weight: var(--label-s-weight);
      line-height: var(--label-s-lh);
      color: var(--gray-300);
      letter-spacing: 0.12px;
      white-space: nowrap;
    }

    .site-footer__credits-links a {
      color: var(--gray-300);
      text-decoration: none;
    }

    .site-footer__credits-links a:hover {
      color: var(--blue-700);
      text-decoration: underline;
    }

    /* --- "by" Badge --- */
    .site-footer__by {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      opacity: 0.5;
    }

    .site-footer__by-text {
      font-family: var(--text-font);
      font-size: 10px;
      color: var(--gray-300);
    }

    .site-footer__by-logo {
      height: 15px;
      width: 43px;
    }

    .site-footer__by-logo svg {
      width: 100%;
      height: 100%;
    }

    /* --- Mobile --- */
    @media (max-width: 768px) {
      .site-footer__links-container {
        flex-direction: column;
        gap: var(--sp-5);
        padding: var(--sp-4) var(--sp-3);
      }

      .site-footer__columns {
        flex-direction: column;
        gap: var(--sp-4);
      }

      .site-footer__credits {
        padding: var(--sp-2) var(--sp-3);
      }

      .site-footer__credits-inner {
        flex-direction: column;
        gap: var(--sp-2);
        align-items: flex-start;
      }
    }
  </style>
</head>
