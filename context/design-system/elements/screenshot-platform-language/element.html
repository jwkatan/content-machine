<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Platform — Language — Swimm Design System Element</title>

  <!-- Shared design tokens -->
  <link rel="stylesheet" href="../tokens.css">

  <!-- Manrope (text font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================
       Screenshot Platform — Unify Domain Language
       ==========================================================
       Platform page screenshot frame at 680x435px.
       Blue 400 → Blue 700 gradient background (242.78deg) with
       a Blue 200 content area where the screenshot sits.
       Left border accent in Blue 800.
       No bottom fade on this variant — the content area fills
       the card directly.

       Figma source:
         File  epnCa2oEzyBli5hF8YI8Ed
         Node  3914:16062  (Desktop)
       ========================================================== */

    /* ---------- Outer frame ---------- */
    .screenshot-platform-language {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 680px;
      height: 435px;
      min-width: 680px;
      overflow: hidden;
      position: relative;
      background-image: linear-gradient(
        242.78deg,
        var(--blue-400) 24.153%,
        var(--blue-700) 60.201%
      );
    }

    /* ---------- Content card ---------- */
    .screenshot-platform-language__card {
      position: relative;
      width: 560px;
      height: 339px;
      background-color: var(--blue-200);
      border-left: 10px solid var(--blue-800);
      overflow: hidden;
    }

    /* ---------- Screenshot image ---------- */
    .screenshot-platform-language__screenshot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       Screenshot Platform — Unify Domain Language (680x435px)
       ============================================================ -->
  <div class="screenshot-platform-language">
    <div class="screenshot-platform-language__card">
      <!-- SWAPPABLE: screenshot -->
      <img
        class="screenshot-platform-language__screenshot"
        src="https://placehold.co/560x339/D5E3FF/1A2761?text=Unify+Domain+Language"
        alt="Unify domain language screenshot"
      >
      <!-- /SWAPPABLE: screenshot -->
    </div>
  </div>

</body>
</html>
