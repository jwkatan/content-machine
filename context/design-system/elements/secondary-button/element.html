<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secondary Button — Swimm Design System</title>
  <link rel="stylesheet" href="../../tokens.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Secondary Button — Base Styles
       ============================================================
       Two variants:
         .secondary-button              -> Text+Icon (default)
         .secondary-button.text-only    -> Text-only (no arrow)
       Hover state applied via CSS :hover pseudo-class.
       Light gradient fill, blue-900 text (default), blue-700 text (hover).
       ============================================================ */

    .secondary-button {
      display: inline-flex;
      align-items: center;
      isolation: isolate;
      cursor: pointer;
      border: none;
      text-decoration: none;
      padding: 0;
      padding-right: 1px;
      background: none;
    }

    /* --- Text Label Container --- */
    .secondary-button__label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      padding: 10px;
      position: relative;
      z-index: 2;
      background-image: linear-gradient(
        60deg,
        var(--blue-300) 29.93%,
        var(--blue-200) 47.38%,
        var(--gray-200) 107.5%,
        var(--gray-150) 141.86%
      );
      transition: background-image 0.2s ease;
    }

    .secondary-button__label span {
      font-family: var(--text-font);
      font-weight: var(--label-l-weight, 400);
      font-size: var(--label-l-size);
      line-height: 0.85;
      color: var(--blue-900);
      text-align: center;
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    /* --- Arrow Icon Container (Text+Icon variant only) --- */
    .secondary-button__icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 34px;
      position: relative;
      z-index: 1;
      margin-left: -1px;
      background-image: linear-gradient(
        60deg,
        var(--blue-300) 29.93%,
        var(--blue-200) 47.38%,
        var(--gray-200) 107.5%,
        var(--gray-150) 141.86%
      );
      transition: background-image 0.2s ease;
    }

    .secondary-button__icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: var(--blue-900);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s ease;
    }

    /* --- Text+Icon: label gets right margin overlap --- */
    .secondary-button:not(.text-only) .secondary-button__label {
      margin-right: -1px;
    }

    /* --- Text-only variant: hide icon --- */
    .secondary-button.text-only .secondary-button__icon {
      display: none;
    }

    .secondary-button.text-only {
      padding-right: 0;
    }

    /* ============================================================
       Hover State — Text+Icon
       Gradient shifts stops leftward. Text color shifts to blue-700.
       ============================================================ */
    .secondary-button:not(.text-only):hover .secondary-button__label {
      background-image: linear-gradient(
        60deg,
        var(--blue-300) 11.99%,
        var(--blue-200) 16.01%,
        var(--gray-200) 49.6%,
        var(--gray-150) 100%
      );
    }

    .secondary-button:not(.text-only):hover .secondary-button__icon {
      background-image: linear-gradient(
        60deg,
        var(--blue-300) 11.99%,
        var(--blue-200) 16.01%,
        var(--gray-200) 49.6%,
        var(--gray-150) 100%
      );
    }

    .secondary-button:not(.text-only):hover .secondary-button__label span {
      color: var(--blue-700);
    }

    .secondary-button:not(.text-only):hover .secondary-button__icon svg {
      stroke: var(--blue-700);
    }

    /* ============================================================
       Hover State — Text-only
       Same gradient shift and text color change.
       ============================================================ */
    .secondary-button.text-only:hover .secondary-button__label {
      background-image: linear-gradient(
        60deg,
        var(--blue-300) 11.99%,
        var(--blue-200) 16.01%,
        var(--gray-200) 49.6%,
        var(--gray-150) 100%
      );
    }

    .secondary-button.text-only:hover .secondary-button__label span {
      color: var(--blue-700);
    }

    /* ============================================================
       Preview Layout (for standalone element preview only)
       ============================================================ */
    .preview-layout {
      display: flex;
      flex-direction: column;
      gap: 32px;
      padding: 48px;
      background: var(--gray-100);
      min-height: 100vh;
    }

    .preview-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .preview-label {
      font-family: var(--text-font);
      font-size: 12px;
      color: var(--gray-500);
      width: 140px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="preview-layout">

    <!-- ========== Text+Icon Variant (Default — hover to see state change) ========== -->
    <div class="preview-row">
      <span class="preview-label">Text+Icon</span>
      <a href="#" class="secondary-button" role="button">
        <div class="secondary-button__label">
          <!-- SWAPPABLE: text --><span>Contact us</span><!-- /SWAPPABLE: text -->
        </div>
        <!-- SWAPPABLE: icon -->
        <div class="secondary-button__icon">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <line x1="1" y1="8" x2="15" y2="8" />
            <polyline points="9 2 15 8 9 14" />
          </svg>
        </div>
        <!-- /SWAPPABLE: icon -->
      </a>
    </div>

    <!-- ========== Text-only Variant (Default — hover to see state change) ========== -->
    <div class="preview-row">
      <span class="preview-label">Text-only</span>
      <a href="#" class="secondary-button text-only" role="button">
        <div class="secondary-button__label">
          <!-- SWAPPABLE: text --><span>Contact us</span><!-- /SWAPPABLE: text -->
        </div>
        <!-- SWAPPABLE: icon -->
        <!-- icon hidden by .text-only class -->
        <div class="secondary-button__icon">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <line x1="1" y1="8" x2="15" y2="8" />
            <polyline points="9 2 15 8 9 14" />
          </svg>
        </div>
        <!-- /SWAPPABLE: icon -->
      </a>
    </div>

  </div>
</body>
</html>
