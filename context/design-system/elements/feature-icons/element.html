<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Icons — Swimm Design System</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Feature Icons — Element Styles
       Figma node 3914:16267 (Swimm MCP Desktop variant)
       ============================================================ */

    body {
      background: var(--blue-900);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: var(--sp-6);
      gap: var(--sp-6);
    }

    /* --- Icon Container (Desktop: 120x120, Mobile: 80x80) --- */
    .feature-icon {
      position: relative;
      width: 120px;
      height: 120px;
      overflow: hidden;
    }

    .feature-icon--mobile {
      width: 80px;
      height: 80px;
    }

    /* --- Inner rotated geometric shape --- */
    .feature-icon__shape {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      width: 192.437px;
      height: 153.807px;
    }

    .feature-icon--mobile .feature-icon__shape {
      width: 128.29px;
      height: 102.54px;
    }

    .feature-icon__shape img {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* --- Variant Labels (for preview only) --- */
    .icon-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-2);
    }

    .icon-label {
      font-family: var(--text-font);
      font-size: var(--label-s-size);
      font-weight: var(--label-s-weight);
      color: var(--blue-300);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Swimm MCP (Desktop) -->
  <div class="icon-row">
    <div class="feature-icon" data-node-id="3914:16267">
      <div class="feature-icon__shape">
        <!-- Geometric gradient shape: overlapping blue/pink/peach rectangles -->
        <svg viewBox="0 0 193 154" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="feat-grad-bg" x1="0" y1="0" x2="193" y2="154" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#AFC8FB"/>
              <stop offset="1" stop-color="#527DFF"/>
            </linearGradient>
            <linearGradient id="feat-grad-mid" x1="40" y1="20" x2="160" y2="140" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#E99DB1"/>
              <stop offset="0.5" stop-color="#FFC381"/>
              <stop offset="1" stop-color="#FFDFBB"/>
            </linearGradient>
            <linearGradient id="feat-grad-top" x1="50" y1="30" x2="150" y2="130" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#D5E3FF"/>
              <stop offset="1" stop-color="#6891F9"/>
            </linearGradient>
          </defs>
          <!-- Back layer: blue gradient rectangle -->
          <rect x="0" y="0" width="193" height="154" rx="4" fill="url(#feat-grad-bg)" opacity="0.6"/>
          <!-- Middle layer: pink/peach gradient rectangle, offset -->
          <rect x="30" y="15" width="140" height="124" rx="4" fill="url(#feat-grad-mid)" opacity="0.85"/>
          <!-- Top layer: light blue gradient rectangle, offset further -->
          <rect x="50" y="30" width="110" height="100" rx="4" fill="url(#feat-grad-top)" opacity="0.7"/>
        </svg>
      </div>
    </div>
    <span class="icon-label">Swimm MCP</span>
  </div>

  </div>

</body>
</html>
