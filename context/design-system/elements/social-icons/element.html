  <title>Social Icons — Swimm Design System</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Social Icons — Element Styles
       Figma nodes 3914:13770 through 3914:13786
       ============================================================ */

    body {
      background: var(--gray-100);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: var(--sp-6);
      gap: var(--sp-6);
    }

    /* --- Icon Row (preview layout) --- */
    .social-icon-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .social-icon-row--labeled {
      gap: var(--sp-5);
    }

    /* --- Single Social Icon --- */
    .social-icon {
      position: relative;
      width: 24px;
      height: 24px;
      overflow: hidden;
      cursor: pointer;
    }

    .social-icon svg {
      width: 100%;
      height: 100%;
      transition: opacity 0.2s ease;
    }

    /* Default fill: Blue 900 on light surfaces */
    .social-icon svg path {
      fill: var(--blue-900);
      transition: fill 0.2s ease;
    }

    /* Hover: Blue 700 */
    .social-icon:hover svg path {
      fill: var(--blue-700);
    }

    /* --- Dark Surface Variant --- */
    .social-icon--dark svg path {
      fill: var(--blue-300);
    }

    .social-icon--dark:hover svg path {
      fill: var(--gray-50);
    }

    /* --- Labels (for preview only) --- */
    .social-icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-1);
    }

    .social-icon-label {
      font-family: var(--text-font);
      font-size: var(--label-s-size);
      font-weight: var(--label-s-weight);
      color: var(--gray-500);
    }

    /* --- Section Labels --- */
    .section-label {
      font-family: var(--text-font);
      font-size: var(--label-m-size);
      font-weight: var(--label-m-weight);
      color: var(--gray-300);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* --- Dark Surface Preview --- */
    .dark-surface {
      background: var(--blue-900);
      padding: var(--sp-4);
      border-radius: 8px;
    }

    .dark-surface .social-icon-label {
      color: var(--blue-300);
    }

    .dark-surface .section-label {
      color: var(--blue-300);
    }
  </style>
</head>
