<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Set — Swimm Design System</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Icon Set — Element Styles
       Figma node 3914:13205 (Security variant)
       ============================================================ */

    body {
      background: var(--blue-900);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: var(--sp-6);
    }

    /* --- Icon Grid (preview layout) --- */
    .icon-set-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-5);
      max-width: 480px;
    }

    /* --- Individual Icon --- */
    .icon-set-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-1);
    }

    .icon-set__icon {
      position: relative;
      width: 64px;
      height: 64px;
      overflow: hidden;
    }

    .icon-set__icon svg {
      width: 100%;
      height: 100%;
    }

    .icon-set__label {
      font-family: var(--text-font);
      font-size: var(--label-s-size);
      font-weight: var(--label-s-weight);
      color: var(--blue-300);
      text-align: center;
    }

    /* --- Light surface variant --- */
    body.surface-light {
      background: var(--gray-100);
    }

    body.surface-light .icon-set__label {
      color: var(--gray-500);
    }

    body.surface-light .icon-set__icon svg .icon-stroke {
      stroke: var(--blue-900);
    }

    body.surface-light .icon-set__icon svg .icon-fill {
      fill: var(--blue-700);
    }
  </style>
</head>
<body>

  <div class="icon-set-grid">

    <!-- Security -->
    <div class="icon-set-item">
      <div class="icon-set__icon" data-node-id="3914:13205">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shield outline -->
          <path class="icon-stroke" d="M32 8L14 18v14c0 12 8 20 18 22 10-2 18-10 18-22V18L32 8z" stroke="var(--blue-300)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <!-- Checkmark -->
          <path class="icon-fill" d="M24 32l5 5 11-11" stroke="var(--blue-700)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <span class="icon-set__label">Security</span>
    </div>

    <!-- On-premise -->
    <div class="icon-set-item">
      <div class="icon-set__icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Server rack -->
          <rect class="icon-stroke" x="14" y="12" width="36" height="14" rx="2" stroke="var(--blue-300)" stroke-width="2" fill="none"/>
          <rect class="icon-stroke" x="14" y="30" width="36" height="14" rx="2" stroke="var(--blue-300)" stroke-width="2" fill="none"/>
          <circle class="icon-fill" cx="22" cy="19" r="2" fill="var(--blue-700)"/>
          <circle class="icon-fill" cx="22" cy="37" r="2" fill="var(--blue-700)"/>
          <line x1="28" y1="19" x2="42" y2="19" stroke="var(--blue-300)" stroke-width="1.5"/>
          <line x1="28" y1="37" x2="42" y2="37" stroke="var(--blue-300)" stroke-width="1.5"/>
          <!-- Base -->
          <line x1="26" y1="48" x2="38" y2="48" stroke="var(--blue-300)" stroke-width="2" stroke-linecap="round"/>
          <line x1="32" y1="44" x2="32" y2="48" stroke="var(--blue-300)" stroke-width="2"/>
        </svg>
      </div>
      <span class="icon-set__label">On-premise</span>
    </div>

    <!-- Customer-managed LLMs -->
    <div class="icon-set-item">
      <div class="icon-set__icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Brain / AI icon -->
          <path class="icon-stroke" d="M32 14c-8 0-16 6-16 16s8 20 16 20 16-12 16-20-8-16-16-16z" stroke="var(--blue-300)" stroke-width="2" fill="none"/>
          <!-- Neural connections -->
          <circle class="icon-fill" cx="26" cy="26" r="2.5" fill="var(--blue-700)"/>
          <circle class="icon-fill" cx="38" cy="26" r="2.5" fill="var(--blue-700)"/>
          <circle class="icon-fill" cx="32" cy="36" r="2.5" fill="var(--blue-700)"/>
          <line x1="26" y1="26" x2="38" y2="26" stroke="var(--blue-300)" stroke-width="1.5"/>
          <line x1="26" y1="26" x2="32" y2="36" stroke="var(--blue-300)" stroke-width="1.5"/>
          <line x1="38" y1="26" x2="32" y2="36" stroke="var(--blue-300)" stroke-width="1.5"/>
        </svg>
      </div>
      <span class="icon-set__label">Customer-managed LLMs</span>
    </div>

    <!-- Proven at scale -->
    <div class="icon-set-item">
      <div class="icon-set__icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Chart / growth -->
          <polyline class="icon-stroke" points="14,46 24,34 34,38 50,18" stroke="var(--blue-700)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <!-- Arrow tip -->
          <polyline points="44,18 50,18 50,24" stroke="var(--blue-700)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <!-- Baseline -->
          <line x1="12" y1="50" x2="52" y2="50" stroke="var(--blue-300)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="icon-set__label">Proven at scale</span>
    </div>

    <!-- Mainframe & legacy -->
    <div class="icon-set-item">
      <div class="icon-set__icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Mainframe body -->
          <rect class="icon-stroke" x="18" y="10" width="28" height="38" rx="3" stroke="var(--blue-300)" stroke-width="2" fill="none"/>
          <!-- Screen -->
          <rect class="icon-fill" x="22" y="14" width="20" height="14" rx="1" fill="var(--blue-700)" opacity="0.3"/>
          <!-- Terminal text lines -->
          <line x1="24" y1="19" x2="34" y2="19" stroke="var(--blue-700)" stroke-width="1.5"/>
          <line x1="24" y1="23" x2="30" y2="23" stroke="var(--blue-700)" stroke-width="1.5"/>
          <!-- Buttons -->
          <circle cx="27" cy="35" r="2" fill="var(--blue-300)"/>
          <circle cx="37" cy="35" r="2" fill="var(--blue-300)"/>
          <!-- Base -->
          <line x1="22" y1="52" x2="42" y2="52" stroke="var(--blue-300)" stroke-width="2" stroke-linecap="round"/>
          <line x1="32" y1="48" x2="32" y2="52" stroke="var(--blue-300)" stroke-width="2"/>
        </svg>
      </div>
      <span class="icon-set__label">Mainframe & legacy</span>
    </div>

    <!-- Stays current -->
    <div class="icon-set-item">
      <div class="icon-set__icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Refresh / sync circle -->
          <path class="icon-stroke" d="M44 24a14 14 0 1 1-3-6" stroke="var(--blue-300)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <!-- Arrow -->
          <polyline points="44,18 44,25 37,25" stroke="var(--blue-700)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <!-- Clock hands -->
          <line x1="32" y1="26" x2="32" y2="34" stroke="var(--blue-700)" stroke-width="2" stroke-linecap="round"/>
          <line x1="32" y1="34" x2="37" y2="37" stroke="var(--blue-700)" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="icon-set__label">Stays current</span>
    </div>

  </div>

</body>
</html>
