    type: text
    description: "H3 feature title shown below the visual area"
  - name: description
    type: text
    description: "P4 feature description alongside the title"
  - name: image
    type: component
    description: "Visual content area (screenshot, diagram, illustration) displayed inside the gradient frame"

surfaces:
  - light
mediums:
  - html
  - marp
  - pptx
