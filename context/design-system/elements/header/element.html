<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header — Swimm Design System</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Header — Element Styles
       Figma node 3914:7052 (Default Desktop)
       ============================================================ */

    body {
      background: var(--gray-50);
    }

    /* --- Header Container --- */
    .site-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px var(--header-pad-h);
      width: 100%;
      max-width: var(--page-max-w);
      margin: 0 auto;
    }

    .site-header__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1920px;
    }

    /* --- Logo + Nav Group --- */
    .site-header__left {
      display: flex;
      align-items: center;
      gap: var(--sp-6);
    }

    /* --- Logo --- */
    .site-header__logo {
      width: 94px;
      height: 34px;
      flex-shrink: 0;
    }

    .site-header__logo svg {
      width: 100%;
      height: 100%;
    }

    /* --- Navigation --- */
    .site-header__nav {
      display: flex;
      align-items: flex-start;
      gap: 28px;
    }

    /* --- Nav Item --- */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      text-decoration: none;
    }

    .nav-item__label {
      font-family: var(--text-font);
      font-size: var(--label-l-size);
      font-weight: var(--label-l-weight);
      line-height: var(--label-l-lh);
      color: var(--blue-900);
      white-space: nowrap;
    }

    .nav-item:hover .nav-item__label {
      color: var(--blue-700);
    }

    /* --- Dropdown Arrow --- */
    .nav-item__arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 7px;
      align-self: stretch;
    }

    .nav-item__arrow svg {
      width: 7.66px;
      height: 4.11px;
      transition: transform 0.2s ease;
    }

    .nav-item:hover .nav-item__arrow svg {
      transform: translateY(1px);
    }

    /* --- CTA Button --- */
    .site-header__cta {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      height: 34px;
      background-image: linear-gradient(
        45deg,
        var(--blue-800) 7.87%,
        var(--blue-700) 67.64%,
        var(--blue-600) 94.61%,
        var(--blue-400) 100%
      );
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .site-header__cta:hover {
      opacity: 0.88;
    }

    .site-header__cta-text {
      font-family: var(--text-font);
      font-size: var(--label-l-size);
      font-weight: var(--label-l-weight);
      line-height: var(--label-l-lh);
      color: var(--blue-100);
      white-space: nowrap;
      text-align: center;
    }

    /* --- Sticky State --- */
    .site-header--sticky {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--gray-50);
      box-shadow: 0 2px 8px rgba(26, 39, 97, 0.08);
      padding: 16px var(--header-pad-h);
    }

    /* --- Mobile (375px) --- */
    @media (max-width: 768px) {
      .site-header {
        padding: 20px var(--sp-3);
      }

      .site-header__nav {
        display: none;
      }

      .site-header__logo {
        width: 76px;
        height: 28px;
      }
    }
  </style>
</head>
<body>
