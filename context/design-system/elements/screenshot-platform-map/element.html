<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Platform — Map — Swimm Design System Element</title>

  <!-- Shared design tokens -->
  <link rel="stylesheet" href="../tokens.css">

  <!-- Manrope (text font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================
       Screenshot Platform — Map the Application
       ==========================================================
       Platform page screenshot frame at 680x435px.
       Blue 400 → Blue 700 gradient background (242.78deg) with
       a radial-gradient-filled content area (light blues) where
       the screenshot sits. Left border accent in Blue 800.
       Bottom fade overlay for depth.

       Figma source:
         File  epnCa2oEzyBli5hF8YI8Ed
         Node  3914:15915  (Desktop)
       ========================================================== */

    /* ---------- Outer frame ---------- */
    .screenshot-platform-map {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 680px;
      height: 435px;
      min-width: 680px;
      overflow: hidden;
      position: relative;
      background-image: linear-gradient(
        242.78deg,
        var(--blue-400) 24.153%,
        var(--blue-700) 60.201%
      );
    }

    /* ---------- Content card ---------- */
    .screenshot-platform-map__card {
      position: relative;
      width: 560px;
      height: 309px;
      border-left: 10px solid var(--blue-800);
      overflow: hidden;

      /* Radial gradient fill — light blue tones from Figma */
      background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 560 309' xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='none'><rect x='0' y='0' height='100%' width='100%' fill='url(%23grad)' opacity='1'/><defs><radialGradient id='grad' gradientUnits='userSpaceOnUse' cx='0' cy='0' r='10' gradientTransform='matrix(36.986 30.897 -32.454 36.905 190.14 0.0000023488)'><stop stop-color='rgba(234,236,249,1)' offset='0.5'/><stop stop-color='rgba(213,227,255,1)' offset='0.75'/><stop stop-color='rgba(198,209,243,1)' offset='1'/></radialGradient></defs></svg>");
      background-size: 100% 100%;
    }

    /* ---------- Screenshot area ---------- */
    .screenshot-platform-map__inner {
      position: absolute;
      top: 31px;
      left: 50%;
      transform: translateX(-50%);
      width: 516px;
      height: 278px;
      overflow: hidden;
    }

    /* ---------- Screenshot image ---------- */
    .screenshot-platform-map__screenshot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ---------- Bottom fade overlay ---------- */
    .screenshot-platform-map__fade {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 896px;
      height: 65px;
      background: linear-gradient(
        180deg,
        rgba(157, 192, 255, 0) 45.709%,
        rgba(157, 192, 255, 0.54) 130.6%
      );
      mix-blend-mode: multiply;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       Screenshot Platform — Map the Application (680x435px)
       ============================================================ -->
  <div class="screenshot-platform-map">
    <div class="screenshot-platform-map__card">

      <!-- Screenshot area -->
      <div class="screenshot-platform-map__inner">
        <!-- SWAPPABLE: screenshot -->
        <img
          class="screenshot-platform-map__screenshot"
          src="https://placehold.co/516x278/F3F3FB/1A2761?text=Map+the+Application"
          alt="Map the application screenshot"
        >
        <!-- /SWAPPABLE: screenshot -->
      </div>

      <!-- Bottom fade overlay -->
      <div class="screenshot-platform-map__fade"></div>

    </div>
  </div>

</body>
</html>
